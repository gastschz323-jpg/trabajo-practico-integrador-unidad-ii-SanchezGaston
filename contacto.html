    <section class="formulario">
      <div class="caja container">
        <div class="row">
          <div class="col-lg-6">
            <form>
              <label for="nombre" class="form-label"> Nombre Completo </label>
              <input
                type="text"
                class="form-control"
                id="nombre"
                placeholder="Tu nombre..."
              />
              <label for="email" class="form-label"> Correo Electrónico </label>
              <input
                type="email"
                class="form-control"
                id="email"
                placeholder="nombre@ejemplo.com"
              />
              <label for="motivo" class="form-label">Motivo de consulta</label>
              <select id="motivo" class="form-select mb-3">
                <option selected disabled>Elegí una opción...</option>
                <option value="1">Inscripciones</option>
                <option value="2">Tecnicaturas</option>
                <option value="3">Becas</option>
                <option value="4">Otro</option>
              </select>
              <label for="mensaje" class="form-label"> Mensaje </label>
              <textarea
                class="form-control"
                id="mensaje"
                rows="4"
                placeholder="¿En qué podemos ayudarte?"
              ></textarea>
              <button type="submit" class="btn btn-success w-100">
                Enviar Consulta
              </button>
            </form>
          </div>
          <div class="col-lg-6">
            <div class="datos">
              <h1>Datos de contacto</h1>
              <h4>Dirección: Ruta Nac. 81 km. 1190 | Formosa</h4>
              <h4>Email: info@ipf.edu.ar</h4>
              <h4>WhatsApp: 3704860530</h4>
            </div>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3583.5712412178195!2d-58.277224999999994!3d-26.080265299999997!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x945cb1005b21b355%3A0x36a052477a923c03!2sInstituto%20Polit%C3%A9cnico%20Formosa!5e0!3m2!1ses-419!2sar!4v1777856639133!5m2!1ses-419!2sar"
              width="600"
              height="450"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
            <div class="datos"></div>
            <div class="mapa mt-4"></div>
          </div>
        </div>
      </div>
    </section>
